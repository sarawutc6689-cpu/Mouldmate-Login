<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOKAI · กำลังตรวจสอบ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Sarabun:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e8e5df;
      --text-primary: #1a1714;
      --text-secondary: #7a7570;
      --text-muted: #b0ada8;
      --accent: #c8321a;
      --accent-light: #f7ede9;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Sarabun', 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 48px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 4px 24px rgba(26,23,20,0.07);
      animation: slideUp 0.4s cubic-bezier(0.4,0,0.2,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .logo-mark {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600; font-size: 15px;
      color: white;
    }

    .brand-name {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Loader */
    .loader-wrap {
      margin: 0 auto 28px;
      width: 64px; height: 64px;
      position: relative;
    }

    .loader-ring {
      width: 64px; height: 64px;
      border-radius: 50%;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loader-dot {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 0.9s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: translate(-50%,-50%) scale(0.7); opacity: 0.5; }
      to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
    }

    h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 20px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.3px;
      margin-bottom: 8px;
    }

    .sub {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 300;
      line-height: 1.6;
    }

    /* Status steps */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 28px 0 0;
      text-align: left;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .step.active { color: var(--text-secondary); }
    .step.done   { color: var(--text-primary); }

    .step-indicator {
      width: 20px; height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
      transition: all 0.3s;
    }

    .step.active .step-indicator {
      border-color: var(--accent);
      background: var(--accent-light);
    }

    .step.done .step-indicator {
      border-color: #2d7a4f;
      background: #edf7f2;
      color: #2d7a4f;
    }

    /* Error state */
    .error-icon {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #fdf0ed;
      border: 2px solid rgba(200,50,26,0.15);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
    }

    .error-icon svg { width: 28px; height: 28px; color: var(--accent); stroke-width: 2; }

    .retry-btn {
      margin-top: 20px;
      padding: 11px 28px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Sarabun', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover { background: #a82815; }

    .footer-note {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
  <div class="card" id="mainCard">
    <div class="brand">
      <div class="logo-mark">T</div>
      <div class="brand-name">Tokaisolidtire</div>
    </div>

    <!-- LOADING STATE (default) -->
    <div id="stateLoading">
      <div class="loader-wrap">
        <div class="loader-ring"></div>
        <div class="loader-dot"></div>
      </div>
      <h2>กำลังตรวจสอบสิทธิ์</h2>
      <p class="sub">กรุณารอสักครู่<br>ระบบกำลังยืนยันตัวตนของคุณ</p>

      <div class="steps">
        <div class="step done" id="step1">
          <div class="step-indicator">✓</div>
          <span>พบ Session Token</span>
        </div>
        <div class="step active" id="step2">
          <div class="step-indicator">
            <svg width="10" height="10" viewBox="0 0 10 10">
              <circle cx="5" cy="5" r="3" fill="currentColor" opacity="0.5">
                <animate attributeName="r" values="2;4;2" dur="1s" repeatCount="indefinite"/>
                <animate attributeName="opacity" values="1;0.2;1" dur="1s" repeatCount="indefinite"/>
              </circle>
            </svg>
          </div>
          <span>ยืนยัน Token กับเซิร์ฟเวอร์</span>
        </div>
        <div class="step" id="step3">
          <div class="step-indicator"></div>
          <span>นำทางไปหน้าหลัก</span>
        </div>
      </div>
    </div>

    <!-- ERROR STATE (hidden) -->
    <div id="stateError" style="display:none">
      <div class="error-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z"/>
        </svg>
      </div>
      <h2>Session หมดอายุ</h2>
      <p class="sub" id="errMsg">ไม่พบข้อมูลการเข้าสู่ระบบ<br>กรุณาล็อกอินใหม่อีกครั้ง</p>
      <button class="retry-btn" onclick="goLogin()">กลับหน้าล็อกอิน</button>
    </div>

    <div class="footer-note">© 2026 Tokaisolidtire · IT Security</div>
  </div>

  <script>
  (function () {
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxuo3p-MB1jrYsFgpC37HIfqjkHQQqN9tpgjSXirAHTkj4YFfZnCdSm0KXsLCNVQs7z/exec";
    const LOGIN_URL  = "Login_Manager.html";
    const TARGET_URL = "https://script.google.com/macros/s/AKfycbww-dXV5cjnV4GQiLl1B-xv5lf9HHF_tfXxL7QWEcK8tm0pjphnmi6BUzPtJtOXM0XB/exec?page=approve";

    window.goLogin = function () {
      localStorage.clear();
      window.location.replace(LOGIN_URL);
    };

    function showError (msg) {
      document.getElementById('stateLoading').style.display = 'none';
      document.getElementById('stateError').style.display   = 'block';
      if (msg) document.getElementById('errMsg').innerHTML = msg;
    }

    function markStep (stepId, state) {
      const el = document.getElementById(stepId);
      el.className = `step ${state}`;
      if (state === 'done') {
        el.querySelector('.step-indicator').innerHTML = '✓';
      }
    }

    async function checkAuth () {
      const token      = localStorage.getItem('authToken');
      const expireTime = parseInt(localStorage.getItem('expireTime') || '0');

      // Step 1: check local token
      if (!token || !expireTime) {
        showError('ไม่พบข้อมูล Session<br>กรุณาล็อกอินใหม่อีกครั้ง');
        return;
      }

      if (Date.now() > expireTime) {
        showError('Session หมดอายุแล้ว<br>กรุณาล็อกอินใหม่อีกครั้ง');
        return;
      }

      // Step 2: verify with server
      try {
        const res  = await fetch(`${SCRIPT_URL}?action=verify&token=${encodeURIComponent(token)}`);
        const data = await res.json();

        console.log('Verify response:', data);

        if (data.valid) {
          markStep('step2', 'done');
          markStep('step3', 'active');

          // อัพเดต displayName ถ้า server ส่งมาใหม่
          if (data.name) localStorage.setItem('displayName', data.name);
          if (data.role) localStorage.setItem('role', data.role);

          setTimeout(() => { window.location.replace(TARGET_URL); }, 600);
        } else {
          showError(data.reason
            ? `${data.reason}<br>กรุณาล็อกอินใหม่อีกครั้ง`
            : 'Token ไม่ถูกต้อง<br>กรุณาล็อกอินใหม่อีกครั้ง'
          );
        }
      } catch (err) {
        console.error('Verify error:', err);
        showError('เกิดข้อผิดพลาดในการเชื่อมต่อ<br>กรุณาลองใหม่หรือล็อกอินใหม่');
      }
    }

    document.addEventListener('DOMContentLoaded', checkAuth);
  })();
  </script>
</body>
</html>
