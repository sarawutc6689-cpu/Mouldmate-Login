<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เข้าสู่ระบบ</title>
<style>
  :root{
    --bg:#0c0808;
    --panel:#1a1111;
    --border:#3d1a1a;
    --text:#f2e8e8;
    --muted:#a68888;
    --accent:#c8202e;
    --accent-dim:#6e1219;
    --error:#ff5a5a;
    --success:#4fd18c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:var(--bg);
    font-family:"Segoe UI", "Sarabun", system-ui, sans-serif;
    color:var(--text);
    padding:24px;
  }
  .hdr-logo{
    display:block;
    max-width:120px;
    height:auto;
    margin:0 auto 20px;
  }
  .card{
    width:100%;
    max-width:360px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:14px;
    padding:36px 30px;
    box-shadow:0 20px 50px rgba(0,0,0,.35);
  }
  h1{
    font-size:20px;
    margin:0 0 6px;
    letter-spacing:.2px;
  }
  p.sub{
    margin:0 0 26px;
    color:var(--muted);
    font-size:13px;
  }
  label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
  }
  input{
    width:100%;
    padding:12px 14px;
    border-radius:8px;
    border:1px solid var(--border);
    background:#140d0d;
    color:var(--text);
    font-size:15px;
    outline:none;
    transition:border-color .15s;
  }
  input:focus{
    border-color:var(--accent);
  }
  button{
    width:100%;
    margin-top:18px;
    padding:12px 14px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, opacity .15s;
  }
  button:hover{background:#a81a26;}
  button:disabled{
    background:var(--accent-dim);
    cursor:not-allowed;
  }
  .msg{
    margin-top:16px;
    font-size:13px;
    min-height:18px;
    text-align:center;
  }
  .msg.error{color:var(--error);}
  .msg.success{color:var(--success);}
  .status{
    display:none;
    text-align:center;
  }
  .status.show{display:block;}
  .status .dot{
    display:inline-block;
    width:8px;height:8px;
    border-radius:50%;
    background:var(--success);
    margin-right:6px;
  }
  .footer{
    margin-top:28px;
    text-align:center;
    color:var(--muted);
    font-size:12px;
    line-height:1.7;
  }
</style>
</head>
<body>

<img id="hdrLogo" class="hdr-logo" alt="โลโก้ Tokai"
     src="https://lh3.googleusercontent.com/d/1g6UjqdgR1SZ8WWHI5pFA5fkeIRRTJtfr=w200"
     data-alt="https://drive.google.com/thumbnail?id=1g6UjqdgR1SZ8WWHI5pFA5fkeIRRTJtfr&sz=w200"
     onerror="this.onerror=null; this.src=this.dataset.alt;">

<div class="card">

  <div id="loginView">
    <h1>เข้าสู่ระบบ</h1>
    <p class="sub">กรอกรหัสผู้ใช้เพื่อเข้าสู่ระบบ</p>

    <label for="userInput">รหัสพนักงาน</label>
    <input id="userInput" type="text" placeholder="" autocomplete="off">

    <button id="loginBtn" onclick="login()">เข้าสู่ระบบ</button>

    <div id="msg" class="msg"></div>
  </div>

  <div id="statusView" class="status">
    <h1><span class="dot"></span>ออนไลน์อยู่</h1>
    <p class="sub" id="statusUser"></p>
    <button onclick="logout()">ออกจากระบบ</button>
    <div id="msg2" class="msg"></div>
  </div>

</div>

<div class="footer">
  ระบบรับของฝากกลับโรงงาน&nbsp;&nbsp;|&nbsp;&nbsp;© 2026&nbsp;&nbsp;|&nbsp;&nbsp;พัฒนาโดย Sarawut.C&nbsp;&nbsp;|&nbsp;&nbsp;ใช้สำหรับภายในองค์กรเท่านั้น
</div>

<script>
  // ⚠️ แก้ URL นี้เป็น URL ของ Apps Script Web App ที่ deploy แล้ว
  const API_URL = "https://script.google.com/macros/s/XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX/exec";

  const loginView = document.getElementById('loginView');
  const statusView = document.getElementById('statusView');
  const userInput = document.getElementById('userInput');
  const loginBtn = document.getElementById('loginBtn');
  const msg = document.getElementById('msg');
  const msg2 = document.getElementById('msg2');
  const statusUser = document.getElementById('statusUser');

  // ถ้าเคยล็อกอินไว้ในเซสชันนี้ ให้แสดงหน้าสถานะทันที
  window.addEventListener('DOMContentLoaded', () => {
    const savedUser = sessionStorage.getItem('loggedInUser');
    if (savedUser) showStatus(savedUser);
  });

  async function login() {
    const user = userInput.value.trim();
    msg.textContent = '';
    msg.className = 'msg';

    if (!user) {
      msg.textContent = 'กรุณากรอกรหัสผู้ใช้';
      msg.className = 'msg error';
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'กำลังตรวจสอบ...';

    try {
      const res = await fetch(`${API_URL}?action=login&user=${encodeURIComponent(user)}`);
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('loggedInUser', user);
        msg.textContent = 'เข้าสู่ระบบสำเร็จ กำลังเปลี่ยนหน้า...';
        msg.className = 'msg success';
        window.location.href = "https://script.google.com/macros/s/AKfycbxSoVyc0rg7RXdPilUfHRZNuuSi8ssWsoFMr2lDwqL7DM_RjYdW0cIBRqT4tdQU2Nob/exec";
        return;
      } else {
        msg.textContent = data.message || 'เข้าสู่ระบบไม่สำเร็จ';
        msg.className = 'msg error';
      }
    } catch (err) {
      msg.textContent = 'เชื่อมต่อเซิร์ฟเวอร์ไม่ได้ ลองใหม่อีกครั้ง';
      msg.className = 'msg error';
    } finally {
      loginBtn.disabled = false;
      loginBtn.textContent = 'เข้าสู่ระบบ';
    }
  }

  async function logout() {
    const user = sessionStorage.getItem('loggedInUser');
    if (!user) return;

    try {
      await fetch(`${API_URL}?action=logout&user=${encodeURIComponent(user)}`);
    } catch (err) {
      // เงียบไว้ก็ได้ ผู้ใช้ไม่จำเป็นต้องเห็น error ตอน logout
    }

    sessionStorage.removeItem('loggedInUser');
    statusView.classList.remove('show');
    loginView.style.display = 'block';
    userInput.value = '';
  }

  function showStatus(user) {
    loginView.style.display = 'none';
    statusView.classList.add('show');
    statusUser.textContent = `เข้าสู่ระบบด้วยรหัส: ${user}`;
  }
</script>

</body>
</html>
