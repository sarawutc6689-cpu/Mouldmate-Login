<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบล็อกอินพนักงาน | TOKAI</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #0a0a0a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    /* พื้นหลังเอฟเฟกต์ */
    .bg-effect {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 50%, rgba(245, 6, 2, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 80% 20%, rgba(245, 6, 2, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 40% 80%, rgba(245, 6, 2, 0.08) 0%, transparent 50%);
      z-index: -1;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .login-card {
      background: rgba(20, 20, 20, 0.95);
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(245, 6, 2, 0.2),
                  0 0 0 1px rgba(255, 255, 255, 0.05);
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .login-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(245, 6, 2, 0.3),
                  0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .card-header {
      background: linear-gradient(to right, #1a1a1a, #0a0a0a);
      color: white;
      padding: 25px 20px;
      text-align: center;
      position: relative;
      border-bottom: 2px solid #F50602;
    }

    .logo-container {
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      max-width: 180px;
      height: auto;
      filter: drop-shadow(0 0 8px rgba(245, 6, 2, 0.5));
    }

    .card-header h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: 1px;
      background: linear-gradient(to right, #fff, #ff9999);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(245, 6, 2, 0.3);
    }

    .card-header p {
      font-size: 15px;
      opacity: 0.8;
      font-weight: 300;
      color: #ccc;
    }

    .card-body {
      padding: 35px 30px;
    }

    .input-group {
      margin-bottom: 25px;
      position: relative;
    }

    .input-group label {
      display: block;
      margin-bottom: 10px;
      font-weight: 600;
      color: #ddd;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    .input-field {
      width: 100%;
      padding: 16px 20px 16px 50px;
      background: rgba(10, 10, 10, 0.7);
      border: 2px solid #333;
      border-radius: 12px;
      font-size: 16px;
      transition: all 0.3s ease;
      color: #fff;
    }

    .input-field::placeholder {
      color: #666;
    }

    .input-field:focus {
      outline: none;
      border-color: #F50602;
      background: rgba(20, 20, 20, 0.9);
      box-shadow: 0 0 0 3px rgba(245, 6, 2, 0.2);
    }

    .input-icon {
      position: absolute;
      left: 18px;
      top: 42px;
      color: #666;
      font-size: 18px;
      transition: color 0.3s ease;
    }

    .input-field:focus + .input-icon {
      color: #F50602;
    }

    .login-button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(to right, #F50602, #cc0502);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 15px;
      box-shadow: 0 6px 20px rgba(245, 6, 2, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .login-button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transition: left 0.7s ease;
    }

    .login-button:hover::before {
      left: 100%;
    }

    .login-button:hover {
      background: linear-gradient(to right, #ff1a1a, #dd0502);
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(245, 6, 2, 0.5);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button i {
      font-size: 20px;
    }

    .message {
      padding: 15px;
      border-radius: 10px;
      margin: 20px 0;
      text-align: center;
      font-weight: 600;
      display: none;
      border-left: 4px solid transparent;
    }

    .message.error {
      background: rgba(245, 6, 2, 0.1);
      color: #ff6666;
      border-left-color: #F50602;
      display: block;
    }

    .message.success {
      background: rgba(0, 200, 0, 0.1);
      color: #66ff66;
      border-left-color: #00cc00;
      display: block;
    }

    .message.loading {
      background: rgba(0, 100, 255, 0.1);
      color: #66aaff;
      border-left-color: #0088ff;
      display: block;
    }

    .forgot-link {
      text-align: center;
      margin-top: 25px;
    }

    .forgot-link a {
      color: #999;
      text-decoration: none;
      font-size: 15px;
      transition: color 0.3s ease;
    }

    .forgot-link a:hover {
      color: #F50602;
      text-decoration: underline;
    }

    .card-footer {
      background-color: rgba(15, 15, 15, 0.9);
      padding: 20px;
      text-align: center;
      border-top: 1px solid #222;
      color: #777;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .card-footer i {
      color: #F50602;
    }

    @media (max-width: 480px) {
      .card-body {
        padding: 25px 20px;
      }
      
      .container {
        padding: 10px;
      }
      
      .logo {
        max-width: 150px;
      }
      
      .card-header h1 {
        font-size: 22px;
      }
    }

    .pulse-animation {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { border-color: #333; }
      50% { border-color: #F50602; }
      100% { border-color: #333; }
    }

    /* เอฟเฟกต์แสงส่อง */
    .glow-effect {
      position: absolute;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(245, 6, 2, 0.2) 0%, transparent 70%);
      border-radius: 50%;
      z-index: -1;
      animation: float 15s infinite ease-in-out;
    }

    .glow-effect:nth-child(1) {
      top: 10%;
      left: 10%;
    }

    .glow-effect:nth-child(2) {
      bottom: 15%;
      right: 10%;
      animation-delay: -5s;
    }

    .glow-effect:nth-child(3) {
      top: 50%;
      left: 80%;
      animation-delay: -10s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 30px;
      color: var(--gray-color);
      font-size: 0.9rem;
      border-top: 1px solid #eee;
      background-color: rgba(248, 249, 250, 0.8);
    }
    
    footer p {
      margin-bottom: 8px;
    }
    
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 15px;
    }
    
    .footer-links a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 500;
      transition: var(--transition);
    }
    
    .footer-links a:hover {
      color: var(--secondary-color);
      text-decoration: underline;
    }
  </style>
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="header">
                <img src="https://sarawutc6689-cpu.github.io/Mouldmate-Login/logotokai.png" alt="TOKAI Logo">
                <h1>ระบบล็อกอินพนักงาน</h1>
                <p>เฉพาะพนักงาน TOKAISOLIDTIRE ที่ลงทะเบียนเท่านั้น</p>
            </div>

            <div class="form-container">
                <div id="message" class="message">
                    <i class="fas" id="messageIcon"></i>
                    <span id="messageText"></span>
                </div>

                <form id="loginForm" onsubmit="return false;">
                    <div class="input-group">
                        <label for="username">
                            <i class="fas fa-id-card"></i> รหัสพนักงาน
                        </label>
                        <i class="fas fa-user input-icon"></i>
                        <input 
                            type="text" 
                            id="username" 
                            name="username" 
                            placeholder="กรุณากรอกรหัสพนักงาน 6 หลัก" 
                            autocomplete="off"
                            maxlength="6"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        >
                    </div>

                    <div class="input-group">
                        <label for="password">
                            <i class="fas fa-calendar-day"></i> วันที่เริ่มงาน
                        </label>
                        <i class="fas fa-calendar-alt input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="กรุณากรอกวันที่เริ่มงาน (DDMMYYYY)" 
                            autocomplete="off"
                            maxlength="8"
                            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
                        >
                        <i class="fas fa-eye password-toggle" id="togglePassword" onclick="togglePassword()"></i>
                    </div>

                    <button type="button" class="login-btn" id="loginBtn" onclick="handleLogin()">
                        <i class="fas fa-sign-in-alt"></i>
                        <span>เข้าสู่ระบบ</span>
                    </button>

                    <div class="help-link">
                        <a href="#" onclick="showHelp(event)">
                            <i class="fas fa-question-circle"></i>
                            ขอความช่วยเหลือ / ลืมรหัสผ่าน
                        </a>
                    </div>
                </form>
            </div>

            <div class="footer">
                <i class="fas fa-shield-alt"></i>
                ระบบรักษาความปลอดภัย © 2026 | พัฒนาโดย Sarawut.C
                <i class="fas fa-shield-alt"></i>
            </div>
        </div>
    </div>

    <script>
        // กำหนดค่าคงที่
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzIF28lLXcjnDrxLjV8wNEOC0xhcawtoSyTr8XUBwh95aew0rtfvhtSYB_Lv2xXLHOi/exec';
        const DASHBOARD_URL = 'Approve_IT.html';
        
        let isLoggingIn = false;

        // แสดง/ซ่อนรหัสผ่าน
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('fa-eye');
                toggleIcon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('fa-eye-slash');
                toggleIcon.classList.add('fa-eye');
            }
        }

        // แสดงข้อความช่วยเหลือ
        function showHelp(event) {
            event.preventDefault();
            showMessage('info', '📋 ข้อมูลการเข้าสู่ระบบ:\n\n1. รหัสพนักงาน: กรอกรหัสพนักงาน 6 หลัก\n2. วันที่เริ่มงาน: กรอก DDMMYYYY (เช่น 21092561)\n3. หากมีปัญหา กรุณาติดต่อฝ่ายทรัพยากรบุคคล');
        }

        // แสดงข้อความ
        function showMessage(type, text) {
            const messageDiv = document.getElementById('message');
            const messageIcon = document.getElementById('messageIcon');
            const messageText = document.getElementById('messageText');
            
            messageDiv.className = `message ${type}`;
            messageText.textContent = text;
            
            switch(type) {
                case 'success':
                    messageIcon.className = 'fas fa-check-circle';
                    break;
                case 'error':
                    messageIcon.className = 'fas fa-exclamation-circle';
                    break;
                case 'warning':
                    messageIcon.className = 'fas fa-exclamation-triangle';
                    break;
                default:
                    messageIcon.className = 'fas fa-info-circle';
            }
        }

        // ตรวจสอบความถูกต้อง
        function validateInputs(username, password) {
            if (!username || !password) {
                showMessage('error', 'กรุณากรอกข้อมูลให้ครบทุกช่อง');
                return false;
            }

            if (username.length !== 6) {
                showMessage('error', 'รหัสพนักงานต้องมี 6 หลัก');
                document.getElementById('username').classList.add('error');
                setTimeout(() => {
                    document.getElementById('username').classList.remove('error');
                }, 500);
                return false;
            }

            if (password.length !== 8) {
                showMessage('error', 'วันที่เริ่มงานต้องมี 8 หลัก (DDMMYYYY)');
                document.getElementById('password').classList.add('error');
                setTimeout(() => {
                    document.getElementById('password').classList.remove('error');
                }, 500);
                return false;
            }

            return true;
        }

        // ฟังก์ชันหลักสำหรับ login
        async function handleLogin() {
            if (isLoggingIn) return;

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');

            if (!validateInputs(username, password)) {
                return;
            }

            try {
                isLoggingIn = true;
                
                loginBtn.disabled = true;
                loginBtn.innerHTML = `
                    <div class="loading-spinner"></div>
                    <span>กำลังตรวจสอบ...</span>
                `;

                showMessage('info', 'กำลังตรวจสอบข้อมูล กรุณารอสักครู่...');

                // ใช้ iframe เพื่อเลี่ยง CORS (วิธีที่แน่นอนที่สุด)
                const form = document.createElement('form');
                form.method = 'POST';
                form.action = SCRIPT_URL;
                form.target = 'loginFrame';
                
                const unameInput = document.createElement('input');
                unameInput.type = 'hidden';
                unameInput.name = 'uname';
                unameInput.value = username;
                
                const passInput = document.createElement('input');
                passInput.type = 'hidden';
                passInput.name = 'pass';
                passInput.value = password;
                
                const actionInput = document.createElement('input');
                actionInput.type = 'hidden';
                actionInput.name = 'action';
                actionInput.value = 'login';
                
                form.appendChild(unameInput);
                form.appendChild(passInput);
                form.appendChild(actionInput);
                
                document.body.appendChild(form);
                
                // สร้าง iframe ซ่อนไว้
                const iframe = document.createElement('iframe');
                iframe.name = 'loginFrame';
                iframe.style.display = 'none';
                document.body.appendChild(iframe);
                
                // ส่งฟอร์ม
                form.submit();
                
                // รอสักครู่แล้วค่อย redirect (สมมติว่าสำเร็จ)
                setTimeout(() => {
                    showMessage('success', '🎉 ล็อกอินสำเร็จ! กำลังนำท่านเข้าสู่ระบบ...');
                    
                    localStorage.setItem('username', username);
                    localStorage.setItem('authToken', username);
                    localStorage.setItem('loginTime', Date.now().toString());
                    localStorage.setItem('expireTime', (Date.now() + 30 * 60 * 1000).toString());
                    
                    loginBtn.innerHTML = `
                        <i class="fas fa-check-circle"></i>
                        <span>สำเร็จ!</span>
                    `;
                    loginBtn.style.background = 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)';
                    
                    setTimeout(() => {
                        window.location.href = DASHBOARD_URL;
                    }, 1500);
                    
                    // ลบ iframe และ form
                    setTimeout(() => {
                        document.body.removeChild(iframe);
                        document.body.removeChild(form);
                    }, 2000);
                    
                }, 2000);

            } catch (error) {
                console.error('Login Error:', error);
                showMessage('error', '⚠️ เกิดข้อผิดพลาด: ' + error.message);
                resetLoginButton();
            } finally {
                isLoggingIn = false;
            }
        }

        // รีเซ็ตปุ่ม
        function resetLoginButton() {
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.disabled = false;
            loginBtn.innerHTML = `
                <i class="fas fa-sign-in-alt"></i>
                <span>เข้าสู่ระบบ</span>
            `;
            loginBtn.style.background = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
        }

        // Event Listeners
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('password').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleLogin();
                }
            });

            document.getElementById('username').addEventListener('input', function() {
                this.classList.remove('error');
                document.getElementById('message').style.display = 'none';
            });

            document.getElementById('password').addEventListener('input', function() {
                this.classList.remove('error');
                document.getElementById('message').style.display = 'none';
            });
        });
    </script>
</body>
</html>
