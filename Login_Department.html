<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: #000000;
      font-family: 'Rajdhani', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Cyber Grid Background */
    .cyber-grid {
      position: absolute;
      width: 100%;
      height: 100%;
      background: 
        linear-gradient(transparent 0%, rgba(255, 0, 0, 0.1) 2%, transparent 3%),
        linear-gradient(90deg, transparent 0%, rgba(255, 0, 0, 0.1) 2%, transparent 3%);
      background-size: 50px 50px;
      z-index: 0;
      animation: gridMove 20s linear infinite;
    }

    @keyframes gridMove {
      0% { transform: translate(0, 0); }
      100% { transform: translate(50px, 50px); }
    }

    /* Floating Red Orbs */
    .red-orb {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle at 30% 30%, rgba(255, 0, 0, 0.8), rgba(139, 0, 0, 0.2));
      border-radius: 50%;
      filter: blur(60px);
      animation: orbFloat 15s ease-in-out infinite;
      z-index: 0;
    }

    .red-orb:nth-child(1) {
      top: -100px;
      left: -100px;
    }

    .red-orb:nth-child(2) {
      bottom: -150px;
      right: -100px;
      width: 400px;
      height: 400px;
      animation-delay: -5s;
    }

    .red-orb:nth-child(3) {
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      opacity: 0.3;
      animation: orbPulse 5s ease-in-out infinite;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, 30px) scale(1.1); }
    }

    @keyframes orbPulse {
      0%, 100% { opacity: 0.2; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.4; transform: translate(-50%, -50%) scale(1.2); }
    }

    /* Matrix Rain Effect */
    .matrix-rain {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255, 0, 0, 0.03) 2px,
        rgba(255, 0, 0, 0.03) 4px
      );
      pointer-events: none;
      z-index: 1;
    }

    /* Glitch Lines */
    .glitch-line {
      position: absolute;
      width: 100%;
      height: 2px;
      background: rgba(255, 0, 0, 0.3);
      animation: glitchLine 8s linear infinite;
      z-index: 1;
    }

    @keyframes glitchLine {
      0% { transform: translateY(-100%) scaleX(0); opacity: 0; }
      10% { transform: translateY(20vh) scaleX(1); opacity: 1; }
      20% { transform: translateY(40vh) scaleX(0.5); opacity: 0.5; }
      30% { transform: translateY(60vh) scaleX(1); opacity: 1; }
      40% { transform: translateY(80vh) scaleX(0.3); opacity: 0.3; }
      50% { transform: translateY(100vh) scaleX(1); opacity: 0; }
      100% { transform: translateY(100vh) scaleX(0); opacity: 0; }
    }

    /* Main Container - Dark with Red Accents */
    .div1 {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 480px;
      padding: 50px 40px;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 0, 0, 0.3);
      border-radius: 20px;
      box-shadow: 
        0 0 30px rgba(255, 0, 0, 0.3),
        inset 0 0 30px rgba(255, 0, 0, 0.1);
      animation: containerGlitch 10s infinite;
      overflow: hidden;
    }

    .div1::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 0, 0, 0.1),
        transparent
      );
      animation: scan 4s linear infinite;
    }

    @keyframes scan {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    @keyframes containerGlitch {
      0%, 100% { border-color: rgba(255, 0, 0, 0.3); }
      2% { border-color: rgba(255, 0, 0, 1); }
      4% { border-color: rgba(255, 0, 0, 0.3); }
      6% { border-color: rgba(255, 0, 0, 1); }
      8% { border-color: rgba(255, 0, 0, 0.3); }
    }

    /* Logo Section - Cyberpunk Style */
    .logo-section {
      text-align: center;
      margin-bottom: 40px;
      position: relative;
    }

    .logo-icon {
      width: 100px;
      height: 100px;
      margin: 0 auto 20px;
      position: relative;
      animation: logoGlitch 5s infinite;
    }

    .logo-icon svg {
      width: 100%;
      height: 100%;
      fill: #ff0000;
      filter: 
        drop-shadow(0 0 10px rgba(255, 0, 0, 0.8))
        drop-shadow(0 0 20px rgba(255, 0, 0, 0.4));
    }

    .logo-icon::before,
    .logo-icon::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 2px solid #ff0000;
      border-radius: 50%;
      animation: pulseRing 2s ease-out infinite;
    }

    .logo-icon::after {
      animation-delay: 1s;
    }

    @keyframes pulseRing {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    @keyframes logoGlitch {
      0%, 100% { transform: translate(0); }
      92% { transform: translate(0); }
      93% { transform: translate(-2px, 2px); }
      94% { transform: translate(2px, -2px); }
      95% { transform: translate(-2px, 2px); }
      96% { transform: translate(2px, -2px); }
      97% { transform: translate(0); }
    }

    .logo-section h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      font-weight: 900;
      color: #ff0000;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 10px;
      text-shadow: 
        0 0 10px #ff0000,
        2px 2px 0 #8b0000,
        -2px -2px 0 #8b0000;
      animation: textFlicker 3s infinite;
    }

    @keyframes textFlicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.3; }
      94% { opacity: 1; }
      95% { opacity: 0.3; }
      96% { opacity: 1; }
    }

    .logo-section p {
      color: #ff4444;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      position: relative;
      display: inline-block;
    }

    .logo-section p::before,
    .logo-section p::after {
      content: '⚡';
      color: #ff0000;
      margin: 0 10px;
      animation: spark 1s infinite;
    }

    @keyframes spark {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Input Fields - Dark with Red Glow */
    .input-group {
      margin-bottom: 25px;
      position: relative;
    }

    .inputtext {
      width: 100%;
      padding: 18px 20px;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid #330000;
      border-radius: 12px;
      font-family: 'Rajdhani', sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #ff6666;
      transition: all 0.3s ease;
      outline: none;
      box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.5);
    }

    .inputtext::placeholder {
      color: #660000;
      font-weight: 400;
      letter-spacing: 1px;
    }

    .inputtext:hover {
      border-color: #ff0000;
      box-shadow: 
        inset 0 0 20px rgba(255, 0, 0, 0.2),
        0 0 20px rgba(255, 0, 0, 0.3);
    }

    .inputtext:focus {
      border-color: #ff0000;
      background: rgba(20, 0, 0, 0.9);
      box-shadow: 
        inset 0 0 30px rgba(255, 0, 0, 0.3),
        0 0 30px rgba(255, 0, 0, 0.5);
      color: #ff0000;
      transform: scale(1.02);
    }

    /* Password Toggle */
    .toggle-password {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #660000;
      cursor: pointer;
      font-size: 20px;
      transition: all 0.3s ease;
      z-index: 20;
    }

    .toggle-password:hover {
      color: #ff0000;
      text-shadow: 0 0 10px #ff0000;
    }

    /* Message Box */
    #msg {
      color: #ff6666;
      font-size: 16px;
      font-weight: 500;
      margin: 20px 0;
      padding: 15px;
      border-radius: 10px;
      background: rgba(255, 0, 0, 0.1);
      border-left: 4px solid #ff0000;
      border-right: 4px solid #ff0000;
      text-align: center;
      animation: msgGlitch 0.5s ease-in-out;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 1px;
    }

    @keyframes msgGlitch {
      0%, 100% { transform: translate(0); opacity: 1; }
      25% { transform: translate(-5px, 2px); opacity: 0.8; }
      50% { transform: translate(5px, -2px); opacity: 0.9; }
      75% { transform: translate(-3px, 1px); opacity: 0.8; }
    }

    /* Cyber Button */
    .button {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #330000 0%, #660000 50%, #990000 100%);
      border: none;
      border-radius: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: #ffffff;
      text-transform: uppercase;
      letter-spacing: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      box-shadow: 
        0 0 30px rgba(255, 0, 0, 0.5),
        inset 0 0 20px rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 0, 0, 0.5);
    }

    .button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255, 255, 255, 0.3),
        transparent
      );
      transition: left 0.5s;
    }

    .button:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 0 50px rgba(255, 0, 0, 0.8),
        inset 0 0 30px rgba(255, 255, 255, 0.3);
      background: linear-gradient(135deg, #660000 0%, #990000 50%, #cc0000 100%);
    }

    .button:hover::before {
      left: 100%;
    }

    .button:active {
      transform: translateY(2px);
      box-shadow: 
        0 0 30px rgba(255, 0, 0, 0.5),
        inset 0 0 20px rgba(0, 0, 0, 0.5);
    }

    /* Loading Spinner - Red Theme */
    .loading {
      display: inline-block;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255, 0, 0, 0.3);
      border-radius: 50%;
      border-top-color: #ff0000;
      border-right-color: #ff0000;
      animation: spin 0.8s linear infinite;
      margin-left: 10px;
      vertical-align: middle;
      box-shadow: 0 0 15px #ff0000;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Features Section */
    .features {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #330000;
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #660000;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      padding: 8px 12px;
      border-radius: 8px;
      background: rgba(255, 0, 0, 0.05);
    }

    .feature-item:hover {
      color: #ff0000;
      background: rgba(255, 0, 0, 0.15);
      text-shadow: 0 0 10px #ff0000;
      transform: scale(1.05);
    }

    .feature-item i {
      font-size: 18px;
      filter: drop-shadow(0 0 5px #ff0000);
    }

    /* Glitch Effects */
    .glitch {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 0, 0, 0.03) 0px,
        rgba(255, 0, 0, 0.03) 2px,
        transparent 2px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 5;
      animation: glitchEffect 0.2s infinite;
    }

    @keyframes glitchEffect {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.1; }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .div1 {
        margin: 20px;
        padding: 30px 20px;
      }
      
      .logo-section h1 {
        font-size: 24px;
      }
      
      .feature-item span:last-child {
        display: none;
      }
    }

    /* Success Animation */
    .success {
      animation: cyberSuccess 0.8s ease;
    }

    @keyframes cyberSuccess {
      0%, 100% { box-shadow: 0 0 30px #ff0000; }
      50% { box-shadow: 0 0 100px #ff0000, 0 0 200px #ff0000; }
    }

    /* Matrix Code Effect */
    .matrix-code {
      position: absolute;
      color: #ff0000;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      opacity: 0.3;
      white-space: nowrap;
      animation: matrixFall 20s linear infinite;
      z-index: 2;
    }

    @keyframes matrixFall {
      from { transform: translateY(-100%); }
      to { transform: translateY(100vh); }
    }
  </style>
</head>

<body>
  <!-- Cyberpunk Background Elements -->
  <div class="cyber-grid"></div>
  
  <!-- Red Orbs -->
  <div class="red-orb"></div>
  <div class="red-orb"></div>
  <div class="red-orb"></div>
  
  <!-- Glitch Lines -->
  <div class="glitch-line" style="top: 20%; animation-delay: 0s;"></div>
  <div class="glitch-line" style="top: 40%; animation-delay: 2s;"></div>
  <div class="glitch-line" style="top: 60%; animation-delay: 4s;"></div>
  <div class="glitch-line" style="top: 80%; animation-delay: 6s;"></div>
  
  <!-- Matrix Rain -->
  <div class="matrix-rain"></div>
  
  <!-- Glitch Overlay -->
  <div class="glitch"></div>

  <!-- Main Login Container -->
  <div class="div1">
    <!-- Logo with Cyberpunk Style -->
    <div class="logo-section">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
        </svg>
      </div>
      <h1>MOULDMATE IT</h1>
      <p>SECURITY LEVEL: MAXIMUM</p>
    </div>

    <form name="myform" method="post" id="loginForm">
      <!-- Username Field -->
      <div class="input-group">
        <input type="text" name="uname" class="inputtext" autocomplete="off" placeholder="> USERNAME" id="username">
      </div>

      <!-- Password Field with Toggle -->
      <div class="input-group">
        <input type="password" name="pass" class="inputtext" autocomplete="off" placeholder="> PASSWORD" id="password">
        <span class="toggle-password" onclick="togglePassword()" id="toggleIcon">👁️</span>
      </div>

      <!-- Message Display -->
      <div id="msg"></div>

      <!-- Login Button -->
      <button type="button" class="button" id="logbutton" onclick="myfunction()">
        <span id="buttonText">ACCESS TERMINAL</span>
        <span id="loadingSpinner" style="display: none;"></span>
      </button>

      <!-- Cyber Features -->
      <div class="features">
        <div class="feature-item" onclick="forgotPassword()">
          <span>🔐</span>
          <span>TERMINAL RECOVERY</span>
        </div>
        <div class="feature-item" onclick="help()">
          <span>⚡</span>
          <span>EMERGENCY PROTOCOL</span>
        </div>
      </div>
    </form>
  </div>

  <script type="text/javascript">
    // Password visibility toggle
    function togglePassword() {
      const password = document.getElementById('password');
      const toggleIcon = document.getElementById('toggleIcon');
      
      if (password.type === 'password') {
        password.type = 'text';
        toggleIcon.textContent = '🔒';
        toggleIcon.style.color = '#ff0000';
      } else {
        password.type = 'password';
        toggleIcon.textContent = '👁️';
        toggleIcon.style.color = '#660000';
      }
    }

    // Create matrix rain effect
    function createMatrixRain() {
      for (let i = 0; i < 50; i++) {
        const matrix = document.createElement('div');
        matrix.className = 'matrix-code';
        matrix.style.left = Math.random() * 100 + '%';
        matrix.style.animationDelay = Math.random() * 20 + 's';
        matrix.style.animationDuration = 10 + Math.random() * 20 + 's';
        matrix.textContent = '01001110 01010101 01001100 01001100';
        document.body.appendChild(matrix);
      }
    }
    createMatrixRain();

    // Main login function
    async function myfunction() {
      const user = document.forms["myform"]["uname"].value.trim();
      const pass = document.forms["myform"]["pass"].value.trim();
      const msgDiv = document.getElementById("msg");
      const button = document.getElementById("logbutton");
      const buttonText = document.getElementById("buttonText");
      const loadingSpinner = document.getElementById("loadingSpinner");
      
      msgDiv.innerHTML = "";
      
      if (!user || !pass) {
        msgDiv.innerHTML = "⚠️ SYSTEM ERROR: INCOMPLETE CREDENTIALS";
        cyberShake();
        return;
      }

      // Loading state
      button.disabled = true;
      button.style.opacity = "0.8";
      buttonText.style.display = "none";
      loadingSpinner.style.display = "inline-block";
      loadingSpinner.className = "loading";

      // Simulate hacking effect
      await new Promise(resolve => setTimeout(resolve, 1500));

      // Valid credentials
      const validCredentials = [
        { user: "104058", pass: "18112562" },
        { user: "103857", pass: "21092561" },
        { user: "1111", pass: "1212" }
      ];

      const isValid = validCredentials.some(cred => cred.user === user && cred.pass === pass);

      if (isValid) {
        msgDiv.innerHTML = "✅ ACCESS GRANTED - WELCOME TO THE MATRIX";
        msgDiv.style.color = "#ff0000";
        msgDiv.style.borderLeftColor = "#ff0000";
        msgDiv.style.borderRightColor = "#ff0000";
        
        button.classList.add("success");
        
        // Cyberpunk redirect effect
        setTimeout(() => {
          window.open('https://sarawutc6689-cpu.github.io/Mouldmate-IT/Portal.html', '_blank');
        }, 1000);
      } else {
        msgDiv.innerHTML = "❌ ACCESS DENIED - INTRUDER DETECTED";
        cyberShake();
        
        // Reset button
        button.disabled = false;
        button.style.opacity = "1";
        buttonText.style.display = "inline";
        loadingSpinner.style.display = "none";
        
        // Trigger glitch effect
        document.body.style.animation = 'glitchEffect 0.5s';
        setTimeout(() => {
          document.body.style.animation = '';
        }, 500);
      }
    }

    // Cyberpunk shake effect
    function cyberShake() {
      const container = document.querySelector('.div1');
      container.style.animation = 'none';
      container.offsetHeight;
      container.style.animation = 'containerGlitch 0.5s';
      
      // Additional glitch effect
      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          document.querySelector('.glitch').style.opacity = '0.5';
        }, i * 100);
        setTimeout(() => {
          document.querySelector('.glitch').style.opacity = '0.3';
        }, i * 100 + 50);
      }
    }

    // Forgot password function
    function forgotPassword() {
      document.getElementById("msg").innerHTML = "🔐 INITIATING TERMINAL RECOVERY PROTOCOL... CONTACT SYSTEM ADMINISTRATOR";
      document.getElementById("msg").style.color = "#ff6666";
    }

    // Help function
    function help() {
      document.getElementById("msg").innerHTML = "⚡ EMERGENCY PROTOCOL ACTIVATED - SUPPORT TERMINAL: admin@mouldmate-cyber.com";
      document.getElementById("msg").style.color = "#ff4444";
    }

    // Enter key support
    document.getElementById('password').addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        event.preventDefault();
        myfunction();
      }
    });

    // Input glow effect
    document.querySelectorAll('.inputtext').forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.style.transform = 'scale(1.02)';
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.style.transform = 'scale(1)';
      });
    });

    // Random glitch effect
    setInterval(() => {
      if (Math.random() > 0.7) {
        document.querySelector('.div1').style.transform = `translate(${Math.random() * 4 - 2}px, ${Math.random() * 4 - 2}px)`;
        setTimeout(() => {
          document.querySelector('.div1').style.transform = 'translate(0, 0)';
        }, 100);
      }
    }, 3000);
  </script>
</body>
</html>
