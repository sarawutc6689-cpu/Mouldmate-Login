<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบล็อกอินพนักงาน | TOKAI</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
    body{background:#0a0a0a;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px;position:relative;overflow:hidden}
    .bg-effect{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 50%,rgba(245,6,2,.15) 0%,transparent 50%),radial-gradient(circle at 80% 20%,rgba(245,6,2,.1) 0%,transparent 50%);z-index:-1}
    .container{width:100%;max-width:480px;margin:0 auto}
    .login-card{background:rgba(20,20,20,.95);border-radius:20px;box-shadow:0 10px 40px rgba(245,6,2,.2),0 0 0 1px rgba(255,255,255,.05);overflow:hidden;border:1px solid rgba(255,255,255,.05)}
    .login-card:hover{transform:translateY(-5px);box-shadow:0 15px 50px rgba(245,6,2,.3)}
    .card-header{background:linear-gradient(to right,#1a1a1a,#0a0a0a);color:white;padding:25px 20px;text-align:center;border-bottom:2px solid #F50602}
    .logo-container{margin-bottom:15px;display:flex;justify-content:center}
    .logo{max-width:180px;height:auto;filter:drop-shadow(0 0 8px rgba(245,6,2,.5))}
    .card-header h1{font-size:26px;font-weight:700;margin-bottom:8px;background:linear-gradient(to right,#fff,#ff9999);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .card-header p{font-size:15px;opacity:.8;color:#ccc}
    .card-body{padding:35px 30px}
    .input-group{margin-bottom:25px;position:relative}
    .input-group label{display:block;margin-bottom:10px;font-weight:600;color:#ddd;font-size:15px}
    .input-field{width:100%;padding:16px 20px 16px 50px;background:rgba(10,10,10,.7);border:2px solid #333;border-radius:12px;font-size:16px;transition:all .3s;color:#fff}
    .input-field::placeholder{color:#666}
    .input-field:focus{outline:none;border-color:#F50602;box-shadow:0 0 0 3px rgba(245,6,2,.2)}
    .input-icon{position:absolute;left:18px;top:42px;color:#666;font-size:18px}
    .login-button{width:100%;padding:18px;background:linear-gradient(to right,#F50602,#cc0502);color:white;border:none;border-radius:12px;font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;cursor:pointer;transition:all .3s;margin-top:15px;box-shadow:0 6px 20px rgba(245,6,2,.3);display:flex;align-items:center;justify-content:center;gap:10px;position:relative;overflow:hidden}
    .login-button:hover{background:linear-gradient(to right,#ff1a1a,#dd0502);transform:translateY(-3px)}
    .login-button:disabled{opacity:.7;cursor:not-allowed;transform:none}
    .message{padding:15px;border-radius:10px;margin:20px 0;text-align:center;font-weight:600;display:none;border-left:4px solid transparent}
    .message.error{background:rgba(245,6,2,.1);color:#ff6666;border-left-color:#F50602;display:block}
    .message.success{background:rgba(0,200,0,.1);color:#66ff66;border-left-color:#00cc00;display:block}
    .message.loading{background:rgba(0,100,255,.1);color:#66aaff;border-left-color:#0088ff;display:block}
    .forgot-link{text-align:center;margin-top:25px}
    .forgot-link a{color:#999;text-decoration:none;font-size:15px;transition:color .3s}
    .forgot-link a:hover{color:#F50602;text-decoration:underline}
    .card-footer{background:rgba(15,15,15,.9);padding:20px;text-align:center;border-top:1px solid #222;color:#777;font-size:14px;display:flex;align-items:center;justify-content:center;gap:10px}
    .card-footer i{color:#F50602}
    .pulse-animation{animation:pulse 1.5s infinite}
    @keyframes pulse{0%{border-color:#333}50%{border-color:#F50602}100%{border-color:#333}}
    .glow-effect{position:absolute;width:200px;height:200px;background:radial-gradient(circle,rgba(245,6,2,.2) 0%,transparent 70%);border-radius:50%;z-index:-1;animation:float 15s infinite ease-in-out}
    .glow-effect:nth-child(1){top:10%;left:10%}
    .glow-effect:nth-child(2){bottom:15%;right:10%;animation-delay:-5s}
    .glow-effect:nth-child(3){top:50%;left:80%;animation-delay:-10s}
    @keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-30px) scale(1.1)}66%{transform:translate(-20px,20px) scale(.9)}}
    @media(max-width:480px){.card-body{padding:25px 20px}.logo{max-width:150px}.card-header h1{font-size:22px}}
  </style>
</head>
<body>
  <div class="bg-effect"></div>
  <div class="glow-effect"></div><div class="glow-effect"></div><div class="glow-effect"></div>

  <div class="container">
    <div class="login-card">
      <div class="card-header">
        <div class="logo-container">
          <img src="https://sarawutc6689-cpu.github.io/Mouldmate-Login/logotokai.png" alt="TOKAI Logo" class="logo">
        </div>
        <h1>ระบบล็อกอินพนักงาน</h1>
        <p>เฉพาะพนักงาน TOKAISOLIDTIRE ที่ลงทะเบียนเท่านั้น</p>
      </div>

      <div class="card-body">
        <form name="myform" onsubmit="return false;">
          <div class="input-group">
            <label><i class="fas fa-id-card"></i> รหัสพนักงาน</label>
            <div class="input-icon"><i class="fas fa-user"></i></div>
            <input type="text" name="uname" id="uname" class="input-field" placeholder="กรุณากรอกรหัสพนักงาน" autocomplete="username">
          </div>
          <div class="input-group">
            <label><i class="fas fa-calendar-day"></i> วันที่เริ่มงาน</label>
            <div class="input-icon"><i class="fas fa-calendar-alt"></i></div>
            <input type="password" name="pass" id="pass" class="input-field" placeholder="กรุณากรอกวันที่เริ่มงาน" autocomplete="current-password">
          </div>
          <div id="msg" class="message"></div>
          <button type="button" class="login-button" onclick="login()">
            <i class="fas fa-sign-in-alt"></i> เข้าสู่ระบบ
          </button>
          <div class="forgot-link">
            <a href="#" onclick="showHelp()"><i class="fas fa-question-circle"></i> ขอความช่วยเหลือ</a>
          </div>
        </form>
      </div>

      <div class="card-footer">
        <i class="fas fa-shield-alt"></i>
        <p>ระบบรักษาความปลอดภัย © 2026 | พัฒนาโดย Sarawut.C</p>
        <i class="fas fa-shield-alt"></i>
      </div>
    </div>
  </div>

  <script>
    const SCRIPT_URL    = "https://script.google.com/macros/s/AKfycbzA6M5nQf36WQZyOQHGMrIK_sEf7LhiFDXprJGBPdEXXF9KDy9m0pli4fash7Gv82k/exec";
    const SHEET_ID      = "1xadpjbQOM4DlpcAjQNuIgdVzLFdPI32xnGCRDMHZylw";
    const DASHBOARD_URL = "Approve_Home.html";

    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('pass').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
      });
    });

    function showHelp() {
      const el = document.getElementById("msg");
      el.className = "message loading";
      el.innerHTML = "<i class='fas fa-info-circle'></i> รหัสพนักงาน: รหัสที่ได้รับจากบริษัท | วันที่เริ่มงาน: รูปแบบ DDMMYYYY | ลืมรหัสผ่านติดต่อฝ่าย HR";
      el.style.display = "block";
      setTimeout(() => { el.style.display = "none"; }, 8000);
    }

    // ดึงชื่อ (คอลัมน์ E) จาก Google Sheets โดยใช้ code (คอลัมน์ A)
    function fetchNameFromSheet(code) {
      const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=DATA`;
      return fetch(url)
        .then(r => r.text())
        .then(txt => {
          const json = JSON.parse(txt.substring(txt.indexOf('{'), txt.lastIndexOf('}') + 1));
          const rows = json.table.rows;
          const match = rows.find(row => (row.c[0]?.v ?? '').toString().trim() === code.trim());
          return match ? (match.c[4]?.v ?? '').toString().trim() : '';
        })
        .catch(() => '');
    }

    function login() {
      const user     = document.forms["myform"]["uname"].value.trim();
      const pass     = document.forms["myform"]["pass"].value.trim();
      const msgEl    = document.getElementById("msg");
      const loginBtn = document.querySelector('.login-button');

      msgEl.className = "message";
      msgEl.style.display = "none";

      if (!user || !pass) {
        msgEl.className = "message error";
        msgEl.innerHTML = "<i class='fas fa-exclamation-circle'></i> กรุณากรอกข้อมูลให้ครบทุกช่อง";
        msgEl.style.display = "block";
        if (!user) { document.getElementById('uname').classList.add('pulse-animation'); setTimeout(()=>document.getElementById('uname').classList.remove('pulse-animation'),1500); }
        if (!pass) { document.getElementById('pass').classList.add('pulse-animation'); setTimeout(()=>document.getElementById('pass').classList.remove('pulse-animation'),1500); }
        return;
      }

      msgEl.className = "message loading";
      msgEl.innerHTML = "<i class='fas fa-spinner fa-spin'></i> กำลังตรวจสอบข้อมูล กรุณารอสักครู่...";
      msgEl.style.display = "block";
      const origBtn = loginBtn.innerHTML;
      loginBtn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> กำลังตรวจสอบ...";
      loginBtn.disabled = true;

      const params = new URLSearchParams({ action: "login", uname: user, pass: pass });
      fetch(SCRIPT_URL + "?" + params.toString())
        .then(res => res.text())
        .then(txt => {
          console.log("Raw response:", txt);
          let data;
          try { data = JSON.parse(txt); } catch(e) {
            msgEl.className = "message error";
            msgEl.innerHTML = "<i class='fas fa-server'></i> การตอบกลับจากเซิร์ฟเวอร์ไม่ถูกต้อง กรุณาลองใหม่";
            msgEl.style.display = "block";
            loginBtn.innerHTML = origBtn; loginBtn.disabled = false; return;
          }
          console.log("Login API response:", data);

          if (data.status === "success") {
            msgEl.className = "message success";
            msgEl.innerHTML = "<i class='fas fa-check-circle'></i> ล็อกอินสำเร็จ! กำลังนำท่านเข้าสู่ระบบ...";
            msgEl.style.display = "block";
            loginBtn.innerHTML = "<i class='fas fa-check'></i> สำเร็จ!";
            loginBtn.style.background = "linear-gradient(to right,#00cc00,#009900)";

            // เก็บ username เสมอ
            localStorage.setItem("username", user);
            localStorage.setItem("authToken", user);
            localStorage.setItem("expireTime", Date.now() + 1000*60*30);

            // ถ้า API ส่ง name กลับมาให้ใช้เลย ถ้าไม่มีให้ดึงจาก Sheets
            const nameFromApi = (data.name || '').toString().trim();
            if (nameFromApi) {
              localStorage.setItem("userName", nameFromApi);
              setTimeout(() => { window.open(DASHBOARD_URL, "_self"); }, 1500);
            } else {
              // fallback: ดึงชื่อจาก Sheets โดยตรง
              fetchNameFromSheet(user).then(name => {
                localStorage.setItem("userName", name || user);
                setTimeout(() => { window.open(DASHBOARD_URL, "_self"); }, 1500);
              });
            }

          } else if (data.status === "denied") {
            msgEl.className = "message error";
            msgEl.innerHTML = "<i class='fas fa-ban'></i> " + (data.message || "บัญชีนี้ถูกระงับการใช้งาน");
            msgEl.style.display = "block";
            loginBtn.innerHTML = origBtn; loginBtn.disabled = false;
          } else {
            msgEl.className = "message error";
            msgEl.innerHTML = "<i class='fas fa-exclamation-circle'></i> รหัสพนักงาน หรือวันที่เริ่มงานไม่ถูกต้อง";
            msgEl.style.display = "block";
            loginBtn.innerHTML = origBtn; loginBtn.disabled = false;
            document.getElementById('uname').classList.add('pulse-animation');
            document.getElementById('pass').classList.add('pulse-animation');
            setTimeout(()=>{document.getElementById('uname').classList.remove('pulse-animation');document.getElementById('pass').classList.remove('pulse-animation');},1500);
          }
        })
        .catch(err => {
          console.error("Login error:", err);
          msgEl.className = "message error";
          msgEl.innerHTML = "<i class='fas fa-exclamation-triangle'></i> เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่";
          msgEl.style.display = "block";
          loginBtn.innerHTML = origBtn; loginBtn.disabled = false;
        });
    }
  </script>
</body>
</html>
